# Mosquitto configuration for Dibby Wemo MQTT Bridge
# Minimal setup — anonymous access allowed on localhost.
# Add password_file and require_certificate for production use.

listener 1883
allow_anonymous true

# WebSocket listener (useful for browser-based MQTT clients)
listener 9001
protocol websockets
allow_anonymous true

# Persistence — keeps retained messages across broker restarts
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
