name: Build & Upload Windows Packages

on:
  # Auto-build the portable .exe + NSIS installer on every release tag.
  push:
    tags:
      - 'v*.*.*'

  # Manual dispatch — useful when a tag was already pushed but the build
  # needs to be re-run (e.g. icon refresh, signing change, or a previously
  # failed run).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to (defaults to current ref tag)'
        required: false
        default: ''

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install workspace dependencies
        run: npm install --legacy-peer-deps

      - name: Vite build
        run: npx electron-vite build
        working-directory: apps/desktop

      - name: Bundle standalone scheduler
        run: node scripts/bundle-standalone.js
        working-directory: apps/desktop

      - name: Build Windows x64 packages
        run: npx electron-builder --win --x64 --publish never --config.win.certificateFile="" --config.win.certificatePassword=""
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ""
          WIN_CSC_LINK: ""

      - name: List build output
        run: dir apps\desktop\dist\

      - name: Resolve target release tag
        id: vars
        shell: bash
        run: |
          # Prefer manual-dispatch input; otherwise use the pushed git tag.
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved tag: ${{ steps.vars.outputs.tag }}"

      - name: Upload Windows packages to release
        if: steps.vars.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.exe.blockmap
            apps/desktop/dist/latest.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
