name: Build & Upload Windows Packages

on:
  # Auto-build the portable .exe + NSIS installer on every release tag.
  push:
    tags:
      - 'v*.*.*'

  # Manual dispatch — useful when a tag was already pushed but the build
  # needs to be re-run (e.g. icon refresh, signing change, or a previously
  # failed run).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to (defaults to current ref tag)'
        required: false
        default: ''

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install workspace dependencies
        run: npm install --legacy-peer-deps

      - name: Download bundled Node.exe for the DibbyWemoService
        # The headless service can't reuse Electron's BoringSSL build —
        # hap-nodejs needs the chacha20-poly1305 cipher exposed, which only
        # real OpenSSL Node provides.  Drop the matching Node LTS binary at
        # apps/desktop/resources/node.exe so electron-builder's
        # extraResources copy step picks it up.
        shell: pwsh
        run: |
          $NODE_VER = (node --version) -replace '^v',''
          Write-Host "Bundling Node $NODE_VER for Windows x64"
          $url = "https://nodejs.org/dist/v$NODE_VER/node-v$NODE_VER-win-x64.zip"
          $tmp = Join-Path $env:RUNNER_TEMP "node-win.zip"
          Invoke-WebRequest -Uri $url -OutFile $tmp -UseBasicParsing
          Expand-Archive -Path $tmp -DestinationPath $env:RUNNER_TEMP -Force
          Copy-Item -Force "$env:RUNNER_TEMP\node-v$NODE_VER-win-x64\node.exe" "apps\desktop\resources\node.exe"
          Get-Item apps\desktop\resources\node.exe | Format-List Name, Length, VersionInfo

      - name: Vite build
        run: npx electron-vite build
        working-directory: apps/desktop

      - name: Bundle standalone scheduler
        run: node scripts/bundle-standalone.js
        working-directory: apps/desktop

      - name: Strip code-signing config for CI builds
        # The real SRS IT code-signing PFX never lands on a CI runner.
        # electron-builder reads `build.win.signtoolOptions.certificateFile`
        # from package.json and tries to sign the .exe with it; the missing
        # file fails the whole build.  Remove the signtoolOptions block in
        # place so electron-builder produces an unsigned .exe instead.
        # CI artifacts are unsigned — locally-built releases re-add the cert
        # via the unmodified package.json.
        shell: pwsh
        working-directory: apps/desktop
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          if ($pkg.build.win.PSObject.Properties.Name -contains 'signtoolOptions') {
            $pkg.build.win.PSObject.Properties.Remove('signtoolOptions')
            $pkg | ConvertTo-Json -Depth 60 | Set-Content package.json -Encoding UTF8
            Write-Host "Stripped build.win.signtoolOptions for CI build."
          }

      - name: Build Windows x64 packages (unsigned)
        run: npx electron-builder --win --x64 --publish never
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ""
          WIN_CSC_LINK: ""

      - name: List build output
        run: dir apps\desktop\dist\

      - name: Resolve target release tag
        id: vars
        shell: bash
        run: |
          # Prefer manual-dispatch input; otherwise use the pushed git tag.
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved tag: ${{ steps.vars.outputs.tag }}"

      - name: Upload Windows packages to release
        if: steps.vars.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.exe.blockmap
            apps/desktop/dist/latest.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
