name: Build & Upload Linux Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg libarchive-tools

      - name: Install root workspace dependencies
        run: npm install --ignore-scripts --legacy-peer-deps

      - name: Vite build
        run: npx electron-vite build
        working-directory: apps/desktop

      - name: Bundle standalone scheduler
        run: node scripts/bundle-standalone.js
        working-directory: apps/desktop

      - name: Build Linux x64 packages
        run: npx electron-builder --linux --x64
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build Linux arm64 packages
        run: npx electron-builder --linux --arm64
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: List build output
        run: ls -lh apps/desktop/dist/

      - name: Upload Linux packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
