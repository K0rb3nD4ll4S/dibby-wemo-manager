name: Publish Node-RED Contrib to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. 2.0.0)'
        required: true
        default: '2.0.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --production
        working-directory: packages/node-red-contrib

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/node-red-contrib
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
