name: Build & Push Docker Image

on:
  # Auto-build on every release tag.
  push:
    tags:
      - 'v*.*.*'

  # Manual run from the Actions UI.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override (defaults to git tag without the v prefix)'
        required: false
        default: ''

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            # ref/tags/v2.0.27 → 2.0.27
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building image tag: $VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/k0rb3nd4ll4s/dibby-wemo-manager:${{ steps.vars.outputs.version }}
            ghcr.io/k0rb3nd4ll4s/dibby-wemo-manager:latest
          labels: |
            org.opencontainers.image.title=Dibby Wemo Manager
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
