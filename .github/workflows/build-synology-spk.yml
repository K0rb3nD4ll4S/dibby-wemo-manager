name: Build & Attach Synology .spk

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-spk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine version
        id: vars
        run: |
          # Prefer the git tag when this run was triggered by a v*.*.* push.
          # On workflow_dispatch (ref is a branch like "main"), fall back to
          # the version in package.json — otherwise we'd produce ".spk" files
          # tagged "main" and attach them to a phantom "vmain" release.
          REF_NAME="${GITHUB_REF_NAME}"
          if echo "$REF_NAME" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
              VERSION="${REF_NAME#v}"
          else
              VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Install build helpers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends curl xz-utils tar

      - name: Ensure scripts are executable (git on Windows sometimes drops the bit)
        run: chmod +x packages/synology-spk/build-spk.sh packages/synology-spk/scripts/*

      - name: Build .spk for every supported DSM arch
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: ./packages/synology-spk/build-spk.sh

      - name: List artifacts
        run: ls -la packages/synology-spk/dist/

      - name: Attach .spk files to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Always attach to the v<version> release, regardless of whether
          # this run was triggered by a tag push or a manual workflow_dispatch.
          tag_name: v${{ steps.vars.outputs.version }}
          files: packages/synology-spk/dist/*.spk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
